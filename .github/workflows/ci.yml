name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  UV_PYTHON: "3.12"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync environment
        run: uv sync --locked --all-groups
      - name: Ruff check
        run: uv run ruff check --config ruff.cognitive-os.toml src/cognitive_os tests/cognitive_os tests/contract scripts
      - name: Ruff format check
        run: uv run ruff format --check --config ruff.cognitive-os.toml src/cognitive_os tests/cognitive_os tests/contract scripts
      - name: Mypy
        run: uv run mypy src/cognitive_os
      - name: Bandit
        run: uv run bandit -r src/cognitive_os
      - name: Contract schema drift
        run: uv run python -m cognitive_os.schemas.export --check

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync environment
        run: uv sync --locked --all-groups --extra mcp
      - name: Cognitive OS tests
        run: uv run pytest tests/cognitive_os -q
      - name: LightAgent contract tests
        run: uv run pytest tests/contract -q
      - name: Full repository tests
        run: uv run pytest -q

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync environment
        run: uv sync --locked --all-groups
      - name: Build distributions
        run: uv build
      - name: Verify wheel installation
        run: ./scripts/verify_distribution.sh
      - name: Verify editable installation
        run: ./scripts/verify_editable_install.sh

  provider-offline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync credential-free provider environment
        run: uv sync --locked --all-groups
      - name: Provider domain and adapter tests
        run: uv run pytest tests/cognitive_os/providers tests/cognitive_os/config -q
      - name: Shared provider contract tests
        run: uv run pytest tests/contract/providers -q
      - name: In-memory provider persistence tests
        run: uv run pytest tests/integration/provider_persistence -q
      - name: Offline replay command
        run: uv run python scripts/provider_replay_test.py
      - name: Credential-safe provider health
        run: uv run python scripts/provider_health.py --config config/providers.example.yaml

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync default and security tools
        run: uv sync --locked --group security
      - name: Core dependency audit
        run: uv run pip-audit
      - name: Secret scan
        run: git ls-files -z | xargs -0 uv run detect-secrets-hook --baseline .secrets.baseline
      - name: Repository language policy
        run: ./scripts/check_repository_language.sh
      - name: Dependency metadata report
        run: uv pip tree

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4-bookworm
        env:
          POSTGRES_DB: cognitive_os_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          PGTZ: UTC
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cognitive_os_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    env:
      COGOS_DATABASE_BOOTSTRAP_URL: postgresql://postgres:postgres@127.0.0.1:5432/cognitive_os_test
      COGOS_DATABASE_ADMIN_URL: postgresql+asyncpg://cogos_owner:owner-ci@127.0.0.1:5432/cognitive_os_test
      COGOS_DATABASE_URL: postgresql+asyncpg://cogos_app:app-ci@127.0.0.1:5432/cognitive_os_test
      COGOS_ARTIFACT_ROOT: /tmp/cognitive-os-artifacts-test
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync PostgreSQL and telemetry extras
        run: uv sync --locked --all-groups --extra postgres --extra observability-otel
      - name: Bootstrap isolated roles
        env:
          PGPASSWORD: postgres
        run: >-
          psql -h 127.0.0.1 -U postgres -d cognitive_os_test
          --set=owner_user=cogos_owner --set=owner_password=owner-ci
          --set=app_user=cogos_app --set=app_password=app-ci
          --set=database_name=cognitive_os_test
          --file infra/postgres/bootstrap/roles.sql
      - name: Upgrade database
        run: uv run alembic -c infra/postgres/alembic.ini upgrade head
      - name: PostgreSQL integration tests
        run: uv run pytest tests/integration/postgres -m postgres -q
      - name: Database and artifact backup restore test
        run: |
          container="$(docker ps --filter ancestor=postgres:18.4-bookworm --format '{{.ID}}' | head -n1)"
          test -n "$container"
          cat > .env.postgres.local <<EOF
          COGOS_POSTGRES_DATABASE=cognitive_os_test
          COGOS_POSTGRES_OWNER_USER=cogos_owner
          COGOS_DATABASE_ADMIN_URL=$COGOS_DATABASE_ADMIN_URL
          COGOS_DATABASE_BOOTSTRAP_URL=$COGOS_DATABASE_BOOTSTRAP_URL
          COGOS_ARTIFACT_ROOT=$COGOS_ARTIFACT_ROOT
          COGOS_BACKUP_ROOT=/tmp/cognitive-os-backup
          COGOS_RESTORE_DATABASE_NAME=cognitive_os_restore_test
          COGOS_RESTORE_DATABASE_URL=postgresql://cogos_owner:owner-ci@127.0.0.1:5432/cognitive_os_restore_test
          COGOS_POSTGRES_TOOL_CONTAINER=$container
          COGOS_CONTAINER_DATABASE_ADMIN_URL=postgresql://cogos_owner:owner-ci@127.0.0.1:5432/cognitive_os_test
          COGOS_CONTAINER_RESTORE_DATABASE_URL=postgresql://cogos_owner:owner-ci@127.0.0.1:5432/cognitive_os_restore_test
          EOF
          chmod 0600 .env.postgres.local
          ./scripts/backup_event_store.sh
          ./scripts/restore_event_store.sh --test-restore

  migration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4-bookworm
        env:
          POSTGRES_DB: cognitive_os_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cognitive_os_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    env:
      COGOS_DATABASE_ADMIN_URL: postgresql+asyncpg://cogos_owner:owner-ci@127.0.0.1:5432/cognitive_os_test
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
      - name: Install Python and dependencies
        run: uv python install 3.12 && uv sync --locked --extra postgres
      - name: Bootstrap isolated roles
        env:
          PGPASSWORD: postgres
        run: >-
          psql -h 127.0.0.1 -U postgres -d cognitive_os_test
          --set=owner_user=cogos_owner --set=owner_password=owner-ci
          --set=app_user=cogos_app --set=app_password=app-ci
          --set=database_name=cognitive_os_test
          --file infra/postgres/bootstrap/roles.sql
      - name: Upgrade, downgrade, re-upgrade, and check drift
        run: |
          uv run alembic -c infra/postgres/alembic.ini upgrade head
          uv run alembic -c infra/postgres/alembic.ini downgrade base
          uv run alembic -c infra/postgres/alembic.ini upgrade head
          uv run alembic -c infra/postgres/alembic.ini check

  optional-boundary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
      - name: Install Python
        run: uv python install 3.12
      - name: Verify default wheel boundary
        run: ./scripts/verify_distribution.sh
