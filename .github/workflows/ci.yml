name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Create environment
        run: uv venv .venv --python 3.12
      - name: Install project
        run: |
          uv pip install -r requirements.txt
          uv pip install pytest pytest-asyncio pytest-cov hypothesis ruff mypy bandit detect-secrets
      - name: Smoke tests
        run: uv run pytest tests/cognitive_os/smoke -q
      - name: Ruff check
        run: uv run ruff check --config ruff.cognitive-os.toml cognitive_os tests/cognitive_os scripts
      - name: Ruff format check
        run: uv run ruff format --check --config ruff.cognitive-os.toml cognitive_os tests/cognitive_os scripts
      - name: Mypy
        run: uv run mypy cognitive_os
      - name: Bandit
        run: uv run bandit -r cognitive_os
      - name: Secret scan
        run: git ls-files -z | xargs -0 uv run detect-secrets-hook --baseline .secrets.baseline
