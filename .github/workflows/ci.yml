name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  UV_PYTHON: "3.12"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync environment
        run: uv sync --locked --all-groups --extra memory-postgres
      - name: Ruff check
        run: uv run ruff check --config ruff.cognitive-os.toml src/cognitive_os tests/cognitive_os tests/contract scripts
      - name: Ruff format check
        run: uv run ruff format --check --config ruff.cognitive-os.toml src/cognitive_os tests/cognitive_os tests/contract scripts
      - name: Mypy
        run: uv run mypy src/cognitive_os
      - name: Bandit
        run: uv run bandit -r src/cognitive_os
      - name: Contract schema drift
        run: uv run python -m cognitive_os.schemas.export --check

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync environment
        run: uv sync --locked --all-groups --extra mcp
      - name: Cognitive OS tests
        run: uv run pytest tests/cognitive_os -q
      - name: LightAgent contract tests
        run: uv run pytest tests/contract -q
      - name: Full repository tests
        run: uv run pytest -q

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync environment
        run: uv sync --locked --all-groups
      - name: Build distributions
        run: uv build
      - name: Verify wheel installation
        run: ./scripts/verify_distribution.sh
      - name: Verify editable installation
        run: ./scripts/verify_editable_install.sh

  provider-offline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync credential-free provider environment
        run: uv sync --locked --all-groups
      - name: Provider domain and adapter tests
        run: uv run pytest tests/cognitive_os/providers tests/cognitive_os/config -q
      - name: Shared provider contract tests
        run: uv run pytest tests/contract/providers -q
      - name: In-memory provider persistence tests
        run: uv run pytest tests/integration/provider_persistence -q
      - name: Offline replay command
        run: uv run python scripts/provider_replay_test.py
      - name: Credential-safe provider health
        run: uv run python scripts/provider_health.py --config config/providers.example.yaml

  tool-plane:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync Tool Plane and MCP dependencies
        run: uv sync --locked --all-groups --extra mcp
      - name: Tool Plane tests
        env:
          COGOS_RUN_MCP_INTEGRATION: "1"
        run: >-
          uv run pytest tests/cognitive_os/tools tests/contract/tools tests/contract/mcp
          tests/integration/mcp tests/integration/tool_persistence -q
      - name: Registry diagnostics
        run: uv run python scripts/tool_registry_list.py --config config/tools.example.yaml
      - name: MCP disabled configuration health
        run: uv run python scripts/mcp_health.py --config config/mcp.example.yaml

  cognitive-controller:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync credential-free controller environment
        run: uv sync --locked --all-groups --extra mcp
      - name: Problem and controller unit tests
        run: >-
          uv run pytest tests/cognitive_os/problem tests/cognitive_os/controller
          tests/cognitive_os/verification/test_minimal.py
          tests/cognitive_os/verification/test_registry_and_contracts.py
          tests/cognitive_os/verification/test_acceptance_and_coding_policy.py
          tests/cognitive_os/domain/test_problems.py -q
      - name: Controller contract and adversarial tests
        run: uv run pytest tests/contract/controller -q
      - name: Credential-free controller smoke test
        run: uv run python scripts/controller_smoke_test.py

  verifier-domains:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync verifier extras
        run: >-
          uv sync --locked --all-groups --extra verification-math
          --extra verification-logic --extra verification-physics --extra postgres
      - name: Verifier, acceptance, and controller integration tests
        run: >-
          uv run pytest tests/cognitive_os/verification tests/contract/verifiers
          tests/contract/acceptance tests/integration/verifier_persistence
          tests/cognitive_os/controller/test_bounded_controller.py -q
      - name: Credential-free Sprint 7 smoke test
        run: uv run python scripts/sprint7_smoke_test.py

  benchmark-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python and core dependencies
        run: uv python install 3.12 && uv sync --locked --all-groups
      - name: Benchmark contracts and runner tests
        run: >-
          uv run pytest tests/cognitive_os/benchmarks tests/contract/benchmarks
          tests/integration/benchmark -q
      - name: Bounded local benchmark gate
        run: >-
          uv run python scripts/benchmark_run.py
          --manifest benchmarks/manifests/sprint7-ci.yaml
          --mode controller-replay --report-directory .tmp-benchmark-reports

  inspect-adapter:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python and Inspect adapter
        run: uv python install 3.12 && uv sync --locked --all-groups --extra benchmark-inspect
      - name: Inspect adapter tests only
        run: uv run pytest tests/cognitive_os/benchmarks/test_adapters.py -q
      - name: Deterministic Inspect export
        run: >-
          uv run python scripts/inspect_export.py
          --manifest benchmarks/manifests/sprint7-ci.yaml
          --output-directory /tmp/cognitive-os-inspect-export

  sandbox:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Build pinned sandbox
        run: ./scripts/sandbox_build.sh
      - name: Verify restricted non-root sandbox
        run: ./scripts/sandbox_smoke_test.sh
      - name: Inspect sandbox image
        run: ./scripts/sandbox_inspect.sh

  coding-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python and dependencies
        run: uv python install 3.12 && uv sync --locked --all-groups
      - name: Coding Agent unit, contract, and worktree tests
        run: >-
          uv run pytest tests/cognitive_os/coding tests/integration/coding -q
      - name: Coding contract schema drift
        run: uv run python -m cognitive_os.schemas.export --check
      - name: Credential-free Coding Agent smoke
        run: uv run python scripts/sprint8_smoke_test.py
      - name: Four-case credential-free coding benchmark
        run: >-
          uv run python scripts/benchmark_run.py
          --manifest benchmarks/manifests/sprint8-coding-ci.yaml
          --mode coding-replay --report-directory /tmp/sprint8-coding-benchmark

  memory-plane-core:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python and core dependencies
        run: uv python install 3.12 && uv sync --locked --all-groups
      - name: Memory contracts, governance, ingestion, retrieval, and adapter tests
        run: uv run pytest tests/cognitive_os/memory -q
      - name: Memory contract schema drift
        run: uv run python -m cognitive_os.schemas.export --check
      - name: Four-case credential-free memory benchmark
        run: >-
          uv run python scripts/benchmark_run.py
          --manifest benchmarks/manifests/sprint9-memory-ci.yaml
          --mode memory-replay --report-directory /tmp/sprint9-memory-benchmark

  semantic-memory-core:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python and semantic graph dependencies
        run: uv python install 3.12 && uv sync --locked --all-groups --extra semantic-graph
      - name: Temporal semantic memory and adversarial tests
        run: uv run pytest tests/cognitive_os/semantic_memory -q
      - name: Semantic benchmark adapter tests
        run: uv run pytest tests/cognitive_os/benchmarks/test_semantic_adapter.py -q
      - name: Semantic contract schema drift
        run: uv run python -m cognitive_os.schemas.export --check
      - name: Four-case credential-free semantic benchmark
        run: >-
          uv run python scripts/benchmark_run.py
          --manifest benchmarks/manifests/sprint10-semantic-ci.yaml
          --mode semantic-replay --report-directory /tmp/sprint10-semantic-benchmark

  context-builder-core:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python and core dependencies
        run: uv python install 3.12 && uv sync --locked --all-groups
      - name: Context Builder unit, integration, and adversarial tests
        run: uv run pytest tests/cognitive_os/context -q
      - name: Context benchmark adapter tests
        run: uv run pytest tests/cognitive_os/benchmarks/test_context_adapter.py -q
      - name: Context contract schema drift
        run: uv run python -m cognitive_os.schemas.export --check
      - name: Deterministic Context Builder smoke
        run: uv run python scripts/context_smoke_test.py
      - name: Six-case credential-free context benchmark
        run: >-
          uv run python scripts/benchmark_run.py
          --manifest benchmarks/manifests/sprint11-context-ci.yaml
          --mode context-replay --report-directory /tmp/sprint11-context-benchmark

  skill-engine-core:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python and core dependencies
        run: uv python install 3.12 && uv sync --locked --all-groups
      - name: Package, lifecycle, and adversarial gate
        run: uv run pytest tests/cognitive_os/skills/test_packages_and_lifecycle.py -q
      - name: Selection, Context, and benchmark-adapter gate
        run: uv run pytest tests/cognitive_os/skills/test_selection_context_and_benchmarks.py -q
      - name: Existing-Controller execution and verifier gate
        run: uv run pytest tests/cognitive_os/skills/test_execution_and_verifiers.py -q
      - name: Skill contract schema gate
        run: uv run python -m cognitive_os.schemas.export --check
      - name: Skill package CLI dry-run gate
        run: >-
          uv run python scripts/skill.py inspect-package
          procedural_skills/coding/repository-inspection
      - name: Deterministic Skill Engine smoke gate
        run: uv run python scripts/skill_smoke_test.py
      - name: Eight-case credential-free skill benchmark gate
        run: >-
          uv run python scripts/benchmark_run.py
          --manifest benchmarks/manifests/sprint12-skill-ci.yaml
          --mode skill-replay --report-directory /tmp/sprint12-skill-benchmark

  strategy-engine-core:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python and core dependencies
        run: uv python install 3.12 && uv sync --locked --all-groups
      - name: Strategy governance, graph, selection, Context, and verifier gate
        run: uv run pytest tests/cognitive_os/strategies -q
      - name: Strategy contract schema gate
        run: uv run python -m cognitive_os.schemas.export --check
      - name: Deterministic Strategy Engine smoke gate
        run: uv run python scripts/strategy_smoke_test.py
      - name: Ten-case credential-free strategy benchmark gate
        run: >-
          uv run python scripts/benchmark_run.py
          --manifest benchmarks/manifests/sprint13-strategies-ci.yaml
          --mode strategy-replay --report-directory /tmp/sprint13-strategy-benchmark
      - name: Forty-case credential-free strategy seed gate
        run: >-
          uv run python scripts/benchmark_run.py
          --manifest benchmarks/manifests/sprint13-strategies-seed.yaml
          --mode strategy-replay --report-directory /tmp/sprint13-strategy-seed

  experience-compiler-core:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python and core dependencies
        run: uv python install 3.12 && uv sync --locked --all-groups
      - name: Experience contracts, compiler, governance, and adversarial gate
        run: uv run pytest tests/cognitive_os/experience -q
      - name: Experience contract schema gate
        run: uv run python -m cognitive_os.schemas.export --check
      - name: Deterministic Experience Compiler smoke gate
        run: uv run python scripts/experience_smoke_test.py
      - name: Twelve-case credential-free Experience Compiler gate
        run: >-
          uv run python scripts/benchmark_run.py
          --manifest benchmarks/manifests/sprint14-experience-ci.yaml
          --mode experience-replay --report-directory /tmp/sprint14-experience-benchmark
      - name: Forty-eight-case credential-free Experience Compiler seed gate
        run: >-
          uv run python scripts/benchmark_run.py
          --manifest benchmarks/manifests/sprint14-experience-seed.yaml
          --mode experience-replay --report-directory /tmp/sprint14-experience-seed

  corpus-factory-core:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python and core dependencies
        run: uv python install 3.12 && uv sync --locked --all-groups
      - name: Corpus contracts, factory, governance, and adversarial gate
        run: uv run pytest tests/cognitive_os/corpus -q
      - name: Corpus contract schema gate
        run: uv run python -m cognitive_os.schemas.export --check
      - name: Deterministic Corpus Factory smoke gate
        run: uv run python scripts/corpus_smoke_test.py
      - name: Fourteen-case credential-free Corpus Factory gate
        run: uv run python scripts/corpus_benchmark.py --cases 14
      - name: Fifty-six-case credential-free Corpus Factory seed gate
        run: uv run python scripts/corpus_benchmark.py --cases 56

  model-routing-core:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python and core dependencies
        run: uv python install 3.12 && uv sync --locked --all-groups
      - name: Routing contracts, governance, statistics, and security gate
        run: uv run pytest tests/cognitive_os/routing -q
      - name: Routing contract schema gate
        run: uv run python -m cognitive_os.schemas.export --check
      - name: Deterministic model routing smoke gate
        run: uv run python scripts/routing_smoke_test.py
      - name: Sixteen-case credential-free routing gate
        run: >-
          uv run python scripts/benchmark_run.py
          --manifest benchmarks/manifests/sprint16-routing-ci.yaml
          --mode routing-replay --report-directory /tmp/sprint16-routing-benchmark
      - name: Sixty-four-case credential-free routing seed gate
        run: >-
          uv run python scripts/benchmark_run.py
          --manifest benchmarks/manifests/sprint16-routing-seed.yaml
          --mode routing-replay --report-directory /tmp/sprint16-routing-seed

  weakness-mining-core:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python and core dependencies
        run: uv python install 3.12 && uv sync --locked --all-groups
      - name: Weakness contracts, governance, lifecycle, and security gate
        run: uv run pytest tests/cognitive_os/weakness -q
      - name: Weakness contract schema gate
        run: uv run python -m cognitive_os.schemas.export --check
      - name: Deterministic weakness smoke gate
        run: uv run python scripts/weakness_smoke_test.py
      - name: Eighteen-case credential-free weakness gate
        run: >-
          uv run python scripts/benchmark_run.py
          --manifest benchmarks/manifests/sprint17-weakness-ci.yaml
          --mode weakness-replay --report-directory /tmp/sprint17-weakness-benchmark
      - name: Seventy-two-case credential-free weakness seed gate
        run: >-
          uv run python scripts/benchmark_run.py
          --manifest benchmarks/manifests/sprint17-weakness-seed.yaml
          --mode weakness-replay --report-directory /tmp/sprint17-weakness-seed

  harness-proposals-core:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python and core dependencies
        run: uv python install 3.12 && uv sync --locked --all-groups
      - name: Proposal contracts, governance, lifecycle, and authority gate
        run: uv run pytest tests/cognitive_os/proposals tests/cognitive_os/benchmarks/test_proposal_adapter.py -q
      - name: Proposal contract schema gate
        run: uv run python -m cognitive_os.schemas.export --check
      - name: Deterministic proposal smoke gate
        run: uv run python scripts/proposal_smoke_test.py
      - name: Sixteen-case credential-free proposal gate
        run: >-
          uv run python scripts/benchmark_run.py
          --manifest benchmarks/manifests/sprint18-proposal-ci.yaml
          --mode proposal-replay --report-directory /tmp/sprint18-proposal-benchmark
      - name: Sixty-four-case credential-free proposal seed gate
        run: >-
          uv run python scripts/benchmark_run.py
          --manifest benchmarks/manifests/sprint18-proposal-seed.yaml
          --mode proposal-replay --report-directory /tmp/sprint18-proposal-seed

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync default and security tools
        run: uv sync --locked --group security
      - name: Core dependency audit
        run: uv run pip-audit
      - name: Secret scan
        run: git ls-files -z | xargs -0 uv run detect-secrets-hook --baseline .secrets.baseline
      - name: Repository language policy
        run: ./scripts/check_repository_language.sh
      - name: Dependency metadata report
        run: uv pip tree

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg18-bookworm
        env:
          POSTGRES_DB: cognitive_os_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          PGTZ: UTC
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cognitive_os_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    env:
      COGOS_DATABASE_BOOTSTRAP_URL: postgresql://postgres:postgres@127.0.0.1:5432/cognitive_os_test
      COGOS_DATABASE_ADMIN_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/cognitive_os_test
      COGOS_DATABASE_URL: postgresql+asyncpg://cogos_app:app-ci@127.0.0.1:5432/cognitive_os_test
      COGOS_ARTIFACT_ROOT: /tmp/cognitive-os-artifacts-test
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync PostgreSQL, Memory Plane, and telemetry extras
        run: >-
          uv sync --locked --all-groups --extra postgres --extra memory-postgres
          --extra observability-otel
      - name: Bootstrap isolated roles
        env:
          PGPASSWORD: postgres
        run: >-
          psql -h 127.0.0.1 -U postgres -d cognitive_os_test
          --set=owner_user=cogos_owner --set=owner_password=owner-ci
          --set=app_user=cogos_app --set=app_password=app-ci
          --set=database_name=cognitive_os_test
          --file infra/postgres/bootstrap/roles.sql
      - name: Upgrade database
        run: uv run alembic -c infra/postgres/alembic.ini upgrade head
      - name: PostgreSQL integration tests
        run: uv run pytest tests/integration/postgres tests/integration/controller -m postgres -q
      - name: Reset semantic smoke projections after repository-level tests
        run: |
          uv run alembic -c infra/postgres/alembic.ini downgrade 0002
          uv run alembic -c infra/postgres/alembic.ini upgrade head
      - name: Memory Plane health
        run: uv run python scripts/memory_health.py
      - name: Credential-free Sprint 9 memory smoke
