benchmark_id: sprint7-seed
version: "1"
title: Sprint 7 deterministic seed suite
description: Bounded credential-free cases covering every Sprint 7 verification domain.
default_configuration:
  mode: verifier_only
source: Cognitive OS Sprint 7 executable backlog
license: Apache-2.0
created_at: 2026-01-01T00:00:00Z
case_matrix:
  generic:
    - {id: generic.artifact-corrupted, expected: failed, verifier: generic.artifact_integrity}
    - {id: generic.artifact-present, verifier: generic.artifact_integrity}
    - {id: generic.exact-match, verifier: generic.exact}
    - {id: generic.exact-mismatch, expected: failed, verifier: generic.exact}
    - {id: generic.json-invalid, expected: failed, verifier: generic.json_schema}
    - {id: generic.json-valid, verifier: generic.json_schema}
    - {id: generic.plan-complete, verifier: generic.plan_consistency}
    - {id: generic.plan-inconsistent, expected: failed, verifier: generic.plan_consistency}
  coding:
    - {id: coding.all-pass, verifier: coding.pytest}
    - {id: coding.binary-added, expected: failed, verifier: coding.file_policy}
    - {id: coding.dependency-added, expected: failed, verifier: coding.dependency_policy}
    - {id: coding.diff-oversized, expected: failed, verifier: coding.diff_policy}
    - {id: coding.forbidden-path, expected: failed, verifier: coding.file_policy}
    - {id: coding.import-failure, expected: failed, verifier: coding.import}
    - {id: coding.mypy-failure, expected: failed, verifier: coding.mypy}
    - {id: coding.pytest-failure, expected: failed, verifier: coding.pytest}
    - {id: coding.ruff-failure, expected: failed, verifier: coding.ruff}
    - {id: coding.symlink-escape, expected: failed, verifier: coding.file_policy}
