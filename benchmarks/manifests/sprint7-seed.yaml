    - {id: mathematics.extraneous-root, expected: failed, verifier: mathematics.equation_solution}
    - {id: mathematics.rational-equality, verifier: mathematics.symbolic_equivalence}
    - {id: mathematics.root, verifier: mathematics.equation_solution}
    - {id: mathematics.symbolic-equivalence, verifier: mathematics.symbolic_equivalence}
    - {id: mathematics.symbolic-non-equivalence, expected: failed, verifier: mathematics.symbolic_equivalence}
    - {id: mathematics.symbolic-timeout, expected: unverifiable, verifier: mathematics.symbolic_equivalence}
    - {id: mathematics.tolerance, verifier: mathematics.numeric}
    - {id: mathematics.unsafe-expression, expected: error, verifier: mathematics.symbolic_equivalence}
  logic:
    - {id: logic.contradiction, verifier: logic.contradiction}
    - {id: logic.equivalence, verifier: logic.equivalence}
    - {id: logic.implication-invalid, expected: failed, verifier: logic.implication}
    - {id: logic.implication-valid, verifier: logic.implication}
    - {id: logic.non-equivalence, expected: failed, verifier: logic.equivalence}
    - {id: logic.oversized-ast, expected: error, verifier: logic.satisfiable}
    - {id: logic.raw-smtlib, expected: error, verifier: logic.satisfiable}
    - {id: logic.satisfiable, verifier: logic.satisfiable}
    - {id: logic.timeout, expected: unverifiable, verifier: logic.satisfiable}
    - {id: logic.type-mismatch, expected: error, verifier: logic.satisfiable}
  physics:
    - {id: physics.custom-definition, expected: error, verifier: physics.quantity}
    - {id: physics.dimension-match, verifier: physics.dimension}
