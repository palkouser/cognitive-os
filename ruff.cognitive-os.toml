target-version = "py312"
line-length = 100
extend-exclude = ["LightAgent", ".venv"]

[lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]
ignore = []

[lint.per-file-ignores]
"src/cognitive_os/domain/enums.py" = ["UP042"]
"src/cognitive_os/domain/identifiers.py" = ["UP040"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
