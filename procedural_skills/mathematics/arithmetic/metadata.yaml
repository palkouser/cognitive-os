  - {name: expression, json_type: string, required: true}
outputs:
  - {name: result, json_type: number, required: true, requires_evidence: true}
steps:
  - {step_id: parse, step_type: artifact_transform, capability_id: mathematics.parse}
  - {step_id: evaluate, step_type: verification_action, capability_id: mathematics.numeric}
requirements:
  - {requirement_id: numeric, requirement_type: verifier, capability_id: mathematics.numeric}
failure_policy: {policy_type: fail_immediately, maximum_fallback_depth: 0}
resource_budget: {maximum_steps: 4, maximum_provider_calls: 0, maximum_tool_calls: 0, maximum_context_builds: 1, maximum_execution_seconds: 30, maximum_repairs: 0, maximum_context_tokens: 2048}
regression_profile: deterministic-arithmetic-v1
