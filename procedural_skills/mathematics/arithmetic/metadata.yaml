purpose: Return an exact arithmetic result with verifier evidence.
domains: [mathematics]
scope_type: project
scope_id: cognitive-os
sensitivity: internal
problem_signatures:
  - {problem_domain: mathematics, task_type: arithmetic}
preconditions:
  - {precondition_id: verifier, precondition_type: verifier_capability, parameters: {capability: mathematics.numeric}}
